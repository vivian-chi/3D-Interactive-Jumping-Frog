<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Green Frog</title>

  <!-- Import map: resolves bare 'three' specifier used inside GLTFLoader -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #D5E8C0;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none; /* prevent scroll/zoom interference on mobile */
    }

    /* ── Vignette overlay ────────────────────────────────────────────────── */
    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        transparent 55%,
        rgba(80, 110, 60, 0.28) 100%
      );
      z-index: 10;
    }

    /* ── Loading UI ──────────────────────────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #D5E8C0;
      z-index: 100;
    }

    /* Spinner */
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(80, 130, 60, 0.25);
      border-top-color: #5a9040;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Progress bar */
    #loading-bar {
      width: 200px;
      height: 6px;
      background: rgba(80, 130, 60, 0.2);
      border-radius: 3px;
      overflow: hidden;
    }

    #loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #5a9040;
      border-radius: 3px;
      transition: width 0.15s ease;
    }

    .loading-label {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #4a7030;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-bar"><div id="loading-bar-fill"></div></div>
    <span class="loading-label">Loading frog…</span>
  </div>

  <!-- Vignette -->
  <div id="vignette"></div>

  <!-- Three.js canvas -->
  <canvas id="canvas"></canvas>

  <!-- Entry point -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
